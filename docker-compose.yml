services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: syncra
      POSTGRES_USER: syncra
      POSTGRES_PASSWORD: syncra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file: ./backend/.env
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

  daphne:
    build: ./backend
    env_file: ./backend/.env
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    depends_on:
      - backend
      - redis

  celery:
    build: ./backend
    env_file: ./backend/.env
    command: celery -A config worker -l info
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/syncra.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - backend
      - daphne
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
